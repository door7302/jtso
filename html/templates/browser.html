<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>OpenJTS - gNMI Browser</title>
    <link rel="stylesheet" href="css/myfonts.css">
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-icons.css">
    <link rel="stylesheet" href="fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/alertify.min.css">
    <link rel="stylesheet" href="css/bootstrap-multiselect.css">
    <link rel="stylesheet" href="css/flip.min.css">
    <link rel="stylesheet" href="css/jtsmain.css">
    {{if .UseFancyTree}}
    <link rel="stylesheet" href="css/jquery-ui.css">
    <link rel="stylesheet" href="css/ui.fancytree.min.css">
    {{else}}
        <link rel="stylesheet" href="css/jstree.css">
        {{end}}

</head>

<body>

    <div class="modal fade" style="animation-name: animatetop;" id="logs" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-dialog-centered" role="document" style="max-width: 47.5%;">
            <div class="modal-content">
                <div class="modal-header" style="background-color: #13215c; color: white;">
                    <h5 class="modal-title" id="modaltitle">Sensor collection, please wait...
                        <i>This may take 2 minutes</i>
                    </h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close" style="background: none; border: none;">
                        <i class="fas fa-times" aria-hidden="true" style="font-size: 1.5rem; color: white;"></i>
                    </button>
                </div>
                <div class="modal-body" style='display: flex;'>
                    <!-- First Column (75%) -->
                    <div id="modalcore" style='flex: 3; padding: 10px; font-family: "Courier New", Courier, monospace; border-right: 1px solid #ddd;'>

                    </div>

                    <!-- Second Column (25%) -->
                    <div class="justify-content-center align-items-center" id="modalgauge" style="flex: 1; padding: 10px; text-align:center;">
                        <p>XPATH Received</p>
                        <div id="tick" class="tick" data-value="0">
                            <div data-layout="horizontal center" data-repeat="true">
                                <span data-view="flip" data-transform="arrive(5, .01) -> round -> split -> delay(rtl, 100, 150)"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <input class="btn btn-success" type="submit" value="Export XPATHs" name="export" id="export" style="margin: 50px;margin-right: 0;margin-bottom: 0;margin-left: 0;" onclick="exportXpath()">
                </div>
            </div>
        </div>
    </div>


    {{template "navbar" .}}

    <div class="container mt-4">
        <div class="d-flex align-items-center mb-4">
            <i class="fas fa-search fa-lg text-success me-2"></i>
            <h1 class="h3 mb-0">Telemetry Browser</h1>
        </div>
    </div>

    <div class="other-div" id="browserDiv">
        <div class="card other-card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="card-title mb-0">Telemetry sensor Analyzer</h4>
                    <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#browserCardBody" aria-expanded="true" aria-controls="browserCardBody" id="browserCollapseBtn">
                        <i class="bi bi-dash"></i>
                    </button>
                </div>
                <div class="collapse show mt-3" id="browserCardBody">
                <form>


                    <label class="form-label">Select a Router:</label>

                    <select id="router" class="selectpicker" data-width="100%">
                        {{range .Rtrs}}
                        <option value="{{.Shortname}}">{{.Shortname}}</option>
                        {{end}}
                    </select>

                    <label class="form-label">Enter the Sensor's Xpath:</label>

                    <input id="pathName" class="form-control mb-2" type="text">


                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="merge" checked>
                        <label class="form-check-label" for="merge">
                            Merge data for cleaner view (recommended)?
                        </label>
                    </div>

                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" id="setTimeoutCheck">
                        <label class="form-check-label" for="setTimeoutCheck">
                            Set Timeout?
                        </label>
                    </div>
                    <div id="timeoutInputDiv" class="mt-2" style="display:none;">
                        <label class="form-label" for="customTimeout">Timeout (secs)</label>
                        <input id="customTimeout" class="form-control" type="number" min="10" max="600" value="30">
                    </div>

                </form>
                <br />
                <div class="d-flex justify-content-center align-items-center">
                    <input class="btn btn-success" type="submit" value="Analyze path" name="browse" id="browse" style="margin: 10px;margin-right: 0;margin-bottom: 0;margin-left: 0;">
                </div>
                </div>
            </div>
        </div>
    </div>
    <br />
    <div class="other-div">
        <div class="card other-card">
            <h4 class="card-title">Results</h4>
            <form>
                <div class="row align-items-center">
                    <div class="col">
                        <label for="inputField" class="visually-hidden">Input</label>
                        <input type="text" class="form-control mb-2" id="searching" name="searching" placeholder="Search in Tree">
                    </div>
                    <div class="col-auto">
                        <button type="button" class="btn btn-success mb-2" name="collapse" id="collapse">Collapse All</button>
                    </div>
                    <div class="col-auto">
                        <button type="button" class="btn btn-success mb-2" name="expand" id="expand">Expand All</button>
                    </div>
                    <div class="col-auto">
                        <button type="button" class="btn btn-success mb-2" name="export" id="export" onclick="exportXpath()">Export last query</button>
                    </div>
                </div>
            </form>
            </br>
            <div id="result">

            </div>

        </div>
    </div>

    <script src="js/jquery-3.6.4.min.js"></script>
    <script src="bootstrap/js/bootstrap.min.js"></script>
    <script src="js/alertify.min.js"></script>
    <script src="js/bootstrap-waitingfor.min.js"></script>
    <script src="js/bootstrap-multiselect.js"></script>
    <script src="js/flip.min.js"></script>
    <script src="js/dark.js"></script>
    {{if .UseFancyTree}}
    <script src="js/jquery-ui.min.js"></script>
    <script src="js/jquery.fancytree-all-deps.min.js"></script>
    <script src="js/browser2.js"></script>
    {{else}}
        <script src="js/jstree.min.js"></script>
        <script src="js/browser.js"></script>
        {{end}}

    <script>
        document.getElementById('setTimeoutCheck').addEventListener('change', function() {
            document.getElementById('timeoutInputDiv').style.display = this.checked ? 'block' : 'none';
        });

        const browserCollapse = document.getElementById('browserCardBody');
        const browserBtn = document.getElementById('browserCollapseBtn');
        browserCollapse.addEventListener('shown.bs.collapse', function() {
            browserBtn.innerHTML = '<i class="bi bi-dash"></i>';
        });
        browserCollapse.addEventListener('hidden.bs.collapse', function() {
            browserBtn.innerHTML = '<i class="bi bi-plus"></i>';
        });
    </script>

</body>

</html>
