<!DOCTYPE html>
<meta charset="utf-8" />
<title>Paths viewer (scoped + AJAX)</title>
<style>
  #render {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    color: #eee;
    font-size: 15px;
  }

  #render .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
  }

  #render h1 {
    font-size: 22px;
    margin-bottom: 12px;
  }

  #render .summary {
    font-size: 14px;
    color: #ccc;
    margin-bottom: 16px;
  }

  #render .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  #render .toolbar input {
    flex: 1;
    min-width: 200px;
    padding: 7px 9px;
    border-radius: 4px;
    border: 1px solid #333;
    background: #181818;
    color: #eee;
    font-size: 14px;
  }

  #render .toolbar select {
    padding: 7px 9px;
    border-radius: 4px;
    border: 1px solid #333;
    background: #181818;
    color: #eee;
    font-size: 14px;
  }

  #render .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: calc(100vh - 130px);
    overflow-y: auto;
  }

  #render .card {
    background: #181818;
    border-radius: 8px;
    border: 1px solid #262626;
    padding: 12px 14px;
  }

  #render .card-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: baseline;
  }

  #render .card-path {
    font-weight: 700;
    font-size: 14px;
    word-break: break-all;
  }

  #render .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 13px;
    color: #ccc;
  }

  #render .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 7px;
    border-radius: 999px;
    background: #222;
    font-size: 12px;
  }

  #render .badge-label {
    opacity: 0.7;
  }

  #render .badge-origin-native {
    border: 1px solid #326335;
    color: #b9f6c5;
  }

  #render .badge-origin-openconfig {
    border: 1px solid #38168C;
    color: #d0c4ff;
  }

  #render .aliases {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  #render .alias-pill {
    padding: 2px 7px;
    border-radius: 999px;
    background: #222;
    font-size: 12px;
  }

  #render .card-footer {
    margin-top: 8px;
    border-top: 1px solid #262626;
    padding-top: 6px;
    display: flex;
    justify-content: flex-end;
    font-size: 12px;
    color: #aaa;
  }

  #render .fields-container {
    margin-top: 8px;
  }

  #render .fields-toggle {
    width: 100%;
    text-align: left;
    background: #202020;
    border-radius: 4px;
    border: 1px solid #303030;
    padding: 5px 7px;
    font-size: 12px;
    color: #ddd;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #render .fields-toggle span {
    pointer-events: none;
  }

  #render .fields-toggle:hover {
    background: #272727;
  }

  #render .fields-list {
    margin-top: 4px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s ease-out;
    background: #151515;
    border-radius: 4px;
    border: 1px solid #262626;
  }

  #render .fields-list.open {
    max-height: 260px;
    overflow-y: auto;
    transition: max-height 0.25s ease-in;
  }

  #render .field-item {
    padding: 5px 9px;
    border-bottom: 1px solid #222;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #render .field-item:last-child {
    border-bottom: none;
  }

  #render .field-item:hover {
    background: #222;
  }

  #render .pill-empty {
    font-size: 12px;
    opacity: 0.7;
  }

  #render .loading,
  #render .error {
    font-size: 13px;
    color: #aaa;
    padding: 8px 0;
  }

  #render .error {
    color: #ff7b7b;
  }
</style>
<body>
<h1>Page title outside render</h1>

<div id="render">
  <div class="app">
    <h1 id="rootTitle"></h1>
    <div class="summary" id="summary"></div>

    <div class="toolbar" id="toolbar" style="display:none;">
      <input id="searchInput" type="text" placeholder="Filter by path or field..." />
      <select id="originFilter">
        <option value="">All origins</option>
        <option value="native">native</option>
        <option value="openconfig">openconfig</option>
      </select>
    </div>

    <div id="status" class="loading">Loading data…</div>
    <div class="cards" id="cardsContainer"></div>
  </div>
</div>

<script>
let initialData = null;

const rootTitle = document.getElementById("rootTitle");
const summaryEl = document.getElementById("summary");
const cardsContainer = document.getElementById("cardsContainer");
const searchInput = document.getElementById("searchInput");
const originFilter = document.getElementById("originFilter");
const statusEl = document.getElementById("status");
const toolbar = document.getElementById("toolbar");

function applyFilters() {
  if (!initialData) return;

  const text = searchInput.value.trim().toLowerCase();
  const origin = originFilter.value;

  const filtered = initialData.listOfPaths.filter(p => {
    if (origin && p.origin !== origin) return false;

    if (!text) return true;

    const inPath = p.name.toLowerCase().includes(text);
    const inFields = (p.listOfFields || []).some(f =>
      f.toLowerCase().includes(text)
    );
    return inPath || inFields;
  });

  renderCards(filtered);
}

function renderCards(paths) {
  cardsContainer.innerHTML = "";
  if (!paths.length) {
    cardsContainer.innerHTML = "<div style='font-size:13px;color:#aaa;'>No paths match filters.</div>";
    return;
  }

  paths.forEach((p) => {
    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "card-header";

    const pathEl = document.createElement("div");
    pathEl.className = "card-path";
    pathEl.textContent = p.name;

    const meta = document.createElement("div");
    meta.className = "card-meta";

    const intervalBadge = document.createElement("div");
    intervalBadge.className = "badge";
    intervalBadge.innerHTML =
      `<span class="badge-label">Interval</span><span>${p.interval} sec(s)</span>`;
    meta.appendChild(intervalBadge);

    const originBadge = document.createElement("div");
    originBadge.className =
      "badge " +
      (p.origin === "native"
        ? "badge-origin-native"
        : "badge-origin-openconfig");
    originBadge.innerHTML =
      `<span class="badge-label">Origin</span><span>${p.origin}</span>`;
    meta.appendChild(originBadge);

    if (p.aliases && p.aliases.length) {
      const aliasesEl = document.createElement("div");
      aliasesEl.className = "aliases";
      p.aliases.forEach(a => {
        const pill = document.createElement("span");
        pill.className = "alias-pill";
        pill.textContent = a;
        aliasesEl.appendChild(pill);
      });
      meta.appendChild(aliasesEl);
    }

    header.appendChild(pathEl);
    header.appendChild(meta);
    card.appendChild(header);

    const fields = p.listOfFields || [];
    const fieldsContainer = document.createElement("div");
    fieldsContainer.className = "fields-container";

    if (fields.length) {
      const toggle = document.createElement("button");
      toggle.type = "button";
      toggle.className = "fields-toggle";
      toggle.innerHTML =
        `<span>Fields (${fields.length})</span><span>▼</span>`;
      const list = document.createElement("div");
      list.className = "fields-list";

      fields.forEach(f => {
        const item = document.createElement("div");
        item.className = "field-item";
        item.title = f;
        item.textContent = f;
        list.appendChild(item);
      });

      toggle.addEventListener("click", () => {
        const isOpen = list.classList.toggle("open");
        toggle.querySelector("span:last-child").textContent = isOpen ? "▲" : "▼";
      });

      fieldsContainer.appendChild(toggle);
      fieldsContainer.appendChild(list);
    } else {
      const empty = document.createElement("div");
      empty.className = "pill-empty";
      empty.textContent = "No fields for this path.";
      fieldsContainer.appendChild(empty);
    }

    card.appendChild(fieldsContainer);

    const footer = document.createElement("div");
    footer.className = "card-footer";
    footer.textContent = `${fields.length} field(s)`;
    card.appendChild(footer);

    cardsContainer.appendChild(card);
  });
}

searchInput.addEventListener("input", applyFilters);
originFilter.addEventListener("change", applyFilters);

async function loadData() {
  try {
    const res = await fetch("/api/paths", { cache: "no-cache" });
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }
    const data = await res.json();
    initialData = data;

    rootTitle.textContent = initialData.rootName;
    const totalPaths = initialData.listOfPaths.length;
    const totalFields = initialData.listOfPaths.reduce(
      (acc, p) => acc + (p.listOfFields ? p.listOfFields.length : 0),
      0
    );
    summaryEl.textContent = `${totalPaths} paths, ${totalFields} fields`;

    statusEl.textContent = "";
    toolbar.style.display = "flex";

    renderCards(initialData.listOfPaths);
  } catch (err) {
    console.error(err);
    statusEl.className = "error";
    statusEl.textContent = "Failed to load data.";
  }
}

loadData();
</script>
</body>
</html>
